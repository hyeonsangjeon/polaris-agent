name: Bug report
description: Report reproducible incorrect behavior or recovery semantics.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Remove tokens, runtime-secret values, prompts, memory/message content, user/chat/channel IDs, private paths, and artifacts. Security vulnerabilities belong in a private advisory.
  - type: input
    id: version
    attributes:
      label: Polaris version or commit
      placeholder: "release tag or commit SHA"
    validations:
      required: true
  - type: input
    id: run-id
    attributes:
      label: Run ID
      description: Include when the bug concerns a run; IDs are not secrets but related data may be.
      placeholder: "run_… or N/A"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Harness component
      options:
        - Run / tool execution
        - Curated memory
        - Scheduler
        - Telegram
        - Slack
        - Runtime secrets / launchd
        - Desktop console
        - Deployment / backup
        - Other
    validations:
      required: true
  - type: input
    id: harness-ids
    attributes:
      label: Job, job-run, platform event, or outbox ID
      description: Include only applicable IDs. IDs are not credentials, but can link to sensitive records.
      placeholder: "job_… / job-run UUID / Telegram update_id / Slack event_id / outbox key / N/A"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Channel platform and event type
      description: For channel bugs, name Telegram or Slack and the event type; do not paste message content.
      placeholder: "Slack app_mention, Telegram message, or N/A"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Docker / NAS-adjacent
        - Other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted `polaris doctor --json`
      description: Remove endpoints, hostnames, usernames, keys, tokens, prompts, and private model names.
      render: json
    validations:
      required: true
  - type: dropdown
    id: recovery-step
    attributes:
      label: Recovery step
      description: Where in the lifecycle was the problem observed?
      options:
        - Initial run
        - Daemon shutdown or process kill
        - Lease expiry
        - Automatic daemon-start recovery
        - Manual resume
        - Approval or uncertainty decision
        - Replay
        - Not recovery-related
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include commands and timing, but replace sensitive values.
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Redacted event or timeline excerpt
      description: Include only the smallest relevant range.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed daemon/provider/channel tokens, runtime-secret values, memory/message content, and private paths.
          required: true
        - label: This is not a private security vulnerability.
          required: true
