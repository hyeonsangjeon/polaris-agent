name: Setup help
description: Ask for help with providers, memory, schedules, channels, secrets, desktop, or Docker.
title: "[Setup]: "
labels: ["setup", "needs-triage"]
body:
  - type: dropdown
    id: path
    attributes:
      label: Setup path
      options:
        - Ollama local
        - Foundry Model Router with API key
        - Foundry Model Router with Entra
        - Curated memory
        - Scheduler / cron
        - Telegram long polling
        - Slack Socket Mode
        - Runtime secrets
        - macOS launchd
        - Tauri macOS console
        - Docker / NAS-adjacent
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Docker Desktop
        - NAS / other
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Redact absolute private paths and all secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted `polaris doctor --json`
      render: json
  - type: textarea
    id: error
    attributes:
      label: Error and current behavior
    validations:
      required: true
  - type: textarea
    id: harness-context
    attributes:
      label: Redacted harness context
      description: Include applicable profile/subject, job/job-run ID, channel platform/event type/event ID, and run ID. Do not include memory or message content.
      placeholder: "profile=default, subject=REDACTED, job=…, platform=Slack, event=app_mention, event_id=…, run=…"
  - type: textarea
    id: docs
    attributes:
      label: Documentation already tried
      placeholder: "README section or documentation URL"
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction
      options:
        - label: I removed API/channel keys, daemon tokens, runtime-secret values, prompts, memory/message content, user/chat/channel IDs, private paths, and sensitive artifacts.
          required: true
