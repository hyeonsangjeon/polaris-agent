name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked development environment
        run: uv sync --locked --dev --all-extras --python "${{ matrix.python-version }}"
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Test with coverage
        run: >-
          uv run pytest
          --cov=polaris
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: error

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  rust:
    name: Rust
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system libraries
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          build-essential
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          libssl-dev
          libxdo-dev
          librsvg2-dev
          patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo fmt --all -- --check
      - run: cargo test --locked
      - run: cargo check --locked

  container:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose
        run: >-
          docker compose
          -f compose.yaml
          -f deploy/docker/compose.secrets.yaml
          config --quiet
      - name: Build image
        uses: docker/bake-action@v7
        with:
          files: compose.yaml
          load: false
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  documentation:
    name: Documentation fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Parse JSON examples
        run: |
          find examples deploy/docker -name '*.json' -print0 |
            xargs -0 -n1 python -m json.tool >/dev/null
      - name: Verify deterministic offline fixture
        run: |
          python scripts/demo/create_fixture.py --output .demo-check-a
          python scripts/demo/create_fixture.py --output .demo-check-b
          diff -ru .demo-check-a .demo-check-b
          python -m json.tool .demo-check-a/manifest.json >/dev/null
          rm -rf .demo-check-a .demo-check-b
      - name: Check repository links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            README.md
            CHANGELOG.md
            SECURITY.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            docs/**/*.md
            examples/**/*.md
            deploy/docker/README.md
            scripts/demo/README.md
          fail: true
