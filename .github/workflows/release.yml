name: Build release candidates

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  python:
    name: Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --dev --all-extras
      - name: Build wheel and source distribution
        run: uv run python -m build
      - name: Verify optional channel metadata
        run: >-
          unzip -p dist/*.whl '*/METADATA' |
          grep -F 'Provides-Extra: channels'
      - name: Verify archives
        run: |
          python -m zipfile --test dist/*.whl
          tar -tzf dist/*.tar.gz >/dev/null
          (cd dist && shasum -a 256 * > SHA256SUMS-python)
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS-python
          if-no-files-found: error

  macos:
    name: macOS Tauri artifact
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: npm ci
      - name: Build unsigned macOS bundles
        run: npm run tauri build -- --bundles app,dmg
      - name: Package app and checksums
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/"Polaris Agent.app" \
            release/polaris-agent-macos.app.zip
          cp src-tauri/target/release/bundle/dmg/*.dmg release/
          (cd release && shasum -a 256 * > SHA256SUMS-macos)
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/desktop/release/*
      - uses: actions/upload-artifact@v4
        with:
          name: macos-tauri
          path: apps/desktop/release/*
          if-no-files-found: error

  github-release:
    name: Attach tag artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/python-distributions/*
          release-assets/macos-tauri/*
          --repo "${GITHUB_REPOSITORY}"
          --draft
          --verify-tag
          --generate-notes

# This workflow intentionally creates artifacts and a draft GitHub release only.
# It never publishes to PyPI. Add trusted publishing in a separately reviewed
# workflow after the package owner and PyPI environment are configured.
