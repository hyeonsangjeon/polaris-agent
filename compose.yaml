services:
  polaris:
    build:
      context: .
      args:
        POLARIS_UID: "${POLARIS_UID:-10001}"
        POLARIS_GID: "${POLARIS_GID:-10001}"
    image: polaris-agent:local
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    ports:
      - "${POLARIS_BIND_ADDRESS:-127.0.0.1}:${POLARIS_PORT:-8765}:8765"
    environment:
      POLARIS_HOME: /data
    volumes:
      - "${POLARIS_DATA_PATH:-./.polaris-data}:/data"
      - "${POLARIS_WORKSPACE_PATH:-./workspace}:/workspace"
      - "${POLARIS_EXPORT_PATH:-./exports}:/exports"
    command:
      - --config
      - /data/config.json
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --allow-remote
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
