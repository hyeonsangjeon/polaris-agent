<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Polaris Agent architecture</title>
  <desc id="desc">The CLI and macOS console call an authenticated loopback daemon. The daemon coordinates a SQLite journal and content-addressed artifacts, then calls local Ollama or a Microsoft Foundry model-router deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#48cae4"/>
      <stop offset="1" stop-color="#90e0ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#90e0ef"/>
    </marker>
    <style>
      .label{font:600 22px ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#f5fbff}
      .small{font:400 16px ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#b9d6e8}
      .eyebrow{font:700 14px ui-sans-serif,system-ui,-apple-system,sans-serif;letter-spacing:2px;fill:#48cae4}
      .box{fill:#102f4d;stroke:#2b6587;stroke-width:2}
      .core{fill:#123c5a;stroke:url(#accent);stroke-width:3}
      .line{fill:none;stroke:#90e0ef;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="85" r="150" fill="#48cae4" opacity=".06"/>
  <circle cx="120" cy="650" r="210" fill="#90e0ef" opacity=".04"/>

  <text x="70" y="66" class="eyebrow">POLARIS AGENT</text>
  <text x="70" y="100" class="label">Durable coordination, explicit routing authority</text>

  <g filter="url(#shadow)">
    <rect x="70" y="155" width="245" height="105" rx="18" class="box"/>
    <text x="98" y="194" class="eyebrow">CLIENTS</text>
    <text x="98" y="228" class="label">CLI · macOS console</text>

    <rect x="405" y="135" width="390" height="250" rx="22" class="core"/>
    <text x="440" y="177" class="eyebrow">LOOPBACK CONTROL PLANE</text>
    <text x="440" y="218" class="label">polarisd · 127.0.0.1:8765</text>
    <text x="440" y="253" class="small">Bearer-authenticated API</text>
    <line x1="440" y1="278" x2="760" y2="278" stroke="#2b6587"/>
    <text x="440" y="314" class="small">Single runtime · K-worker engine</text>
    <text x="440" y="345" class="small">Leases · approvals · budgets · recovery</text>

    <rect x="885" y="150" width="245" height="120" rx="18" class="box"/>
    <text x="913" y="190" class="eyebrow">LOCAL MODELS</text>
    <text x="913" y="226" class="label">Ollama</text>
    <text x="913" y="251" class="small">explicit K workers</text>

    <rect x="885" y="325" width="245" height="145" rx="18" class="box"/>
    <text x="913" y="365" class="eyebrow">ROUTED MODELS</text>
    <text x="913" y="401" class="label">Foundry Router</text>
    <text x="913" y="428" class="small">Responses API</text>
    <text x="913" y="453" class="small">Foundry selects model</text>

    <rect x="290" y="505" width="285" height="130" rx="18" class="box"/>
    <text x="320" y="545" class="eyebrow">JOURNAL</text>
    <text x="320" y="581" class="label">SQLite WAL</text>
    <text x="320" y="609" class="small">steps · calls · receipts · events</text>

    <rect x="625" y="505" width="285" height="130" rx="18" class="box"/>
    <text x="655" y="545" class="eyebrow">EVIDENCE</text>
    <text x="655" y="581" class="label">Hashed artifacts</text>
    <text x="655" y="609" class="small">reports · claims · disagreements</text>
  </g>

  <path d="M315 208 H390" class="line"/>
  <path d="M795 215 H870" class="line"/>
  <path d="M795 330 C840 330 840 398 870 398" class="line"/>
  <path d="M530 385 V490" class="line"/>
  <path d="M680 385 C680 445 768 445 768 490" class="line"/>

  <text x="70" y="690" class="small">Opaque ambiguous effects stop for operator approval · no arbitrary exactly-once claim</text>
</svg>
