<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Polaris Agent v0.2 harness architecture</title>
  <desc id="desc">Local clients and allowlisted Telegram or Slack adapters use a durable daemon. The daemon connects model loops to scoped operating-system tools, curated memory, schedules, SQLite state, Ollama, and Foundry Router.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#90e0ef"/>
    </marker>
    <style>
      .title{font:600 22px ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#f5fbff}
      .body{font:400 16px ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#b9d6e8}
      .tag{font:700 13px ui-sans-serif,system-ui,-apple-system,sans-serif;letter-spacing:1.6px;fill:#48cae4}
      .box{fill:#102f4d;stroke:#2b6587;stroke-width:2}
      .core{fill:#123c5a;stroke:#90e0ef;stroke-width:3}
      .line{fill:none;stroke:#90e0ef;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" class="tag">POLARIS AGENT</text>
  <text x="60" y="92" class="title">Model reasoning, explicit OS hands, durable operator context</text>

  <rect x="60" y="140" width="260" height="115" rx="18" class="box"/>
  <text x="88" y="178" class="tag">LOCAL CLIENTS</text>
  <text x="88" y="212" class="title">CLI · macOS console</text>
  <text x="88" y="238" class="body">runs · memory · schedules</text>

  <rect x="60" y="300" width="260" height="130" rx="18" class="box"/>
  <text x="88" y="338" class="tag">PRIVATE CHANNELS</text>
  <text x="88" y="372" class="title">Telegram · Slack</text>
  <text x="88" y="399" class="body">allowlists · durable delivery</text>

  <rect x="410" y="125" width="380" height="320" rx="22" class="core"/>
  <text x="445" y="168" class="tag">DURABLE HARNESS</text>
  <text x="445" y="207" class="title">polarisd · local control plane</text>
  <line x1="445" y1="230" x2="755" y2="230" stroke="#2b6587"/>
  <text x="445" y="266" class="body">Model loops + approvals + recovery</text>
  <text x="445" y="300" class="body">OS hands: filesystem · HTTP · shell</text>
  <text x="445" y="334" class="body">Curated memory: frozen scoped snapshot</text>
  <text x="445" y="368" class="body">Scheduler: once · interval · cron</text>
  <text x="445" y="402" class="body">Channel inbox · outbox · event dedupe</text>

  <rect x="880" y="140" width="260" height="115" rx="18" class="box"/>
  <text x="908" y="178" class="tag">LOCAL MODEL</text>
  <text x="908" y="212" class="title">Ollama</text>
  <text x="908" y="238" class="body">single or explicit K workers</text>

  <rect x="880" y="300" width="260" height="130" rx="18" class="box"/>
  <text x="908" y="338" class="tag">ROUTED MODEL</text>
  <text x="908" y="372" class="title">Foundry Router</text>
  <text x="908" y="399" class="body">Foundry selects the model</text>

  <rect x="285" y="520" width="630" height="120" rx="20" class="box"/>
  <text x="320" y="558" class="tag">LOCAL DURABLE STATE</text>
  <text x="320" y="592" class="title">SQLite journal + content-addressed artifacts</text>
  <text x="320" y="619" class="body">runs · memory · jobs · events · approvals · receipts · evidence</text>

  <path d="M320 198 H395" class="line"/>
  <path d="M320 365 H395" class="line"/>
  <path d="M790 198 H865" class="line"/>
  <path d="M790 365 H865" class="line"/>
  <path d="M600 445 V505" class="line"/>

  <text x="60" y="686" class="body">Ambiguous effects and unknown sends stop for an explicit operator decision.</text>
</svg>
